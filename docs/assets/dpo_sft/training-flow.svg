<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">DPO 与 SFT 联合损失的单批次计算流</title>
  <desc id="desc">chosen 和 rejected 分别进入策略模型与冻结参考模型。策略模型的 chosen logits 同时计算 DPO 序列分数和 response-only SFT 交叉熵，最后加权求和。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#66736c"/>
    </marker>
    <style>
      text { font-family: Inter, "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #1e2521; }
      .title { font-family: Georgia, "Noto Serif CJK SC", serif; font-size: 34px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #657069; }
      .box-title { font-size: 20px; font-weight: 700; }
      .body { font-size: 16px; fill: #4f5a54; }
      .inverse { fill: #ffffff; }
      .inverse-soft { fill: #dce8e1; }
      .edge { fill: none; stroke: #66736c; stroke-width: 2.5; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #9ba59f; stroke-width: 2; stroke-dasharray: 6 7; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#f7f7f2"/>
  <text x="62" y="67" class="title">一个 batch 内的计算流</text>
  <text x="62" y="102" class="subtitle">chosen 的策略前向结果被复用；reference model 只提供固定基线，不参与反向传播</text>

  <rect x="60" y="160" width="220" height="120" rx="18" fill="#fff" stroke="#cfd8d2" stroke-width="2"/>
  <text x="88" y="205" class="box-title">Preference batch</text>
  <text x="88" y="240" class="body">prompt + chosen</text>
  <text x="88" y="266" class="body">prompt + rejected</text>

  <rect x="370" y="135" width="260" height="145" rx="18" fill="#e9f4ef" stroke="#79a992" stroke-width="2"/>
  <text x="402" y="180" class="box-title">Policy model πθ</text>
  <text x="402" y="216" class="body">chosen forward → logits+</text>
  <text x="402" y="244" class="body">rejected forward → logits-</text>
  <rect x="525" y="250" width="78" height="26" rx="13" fill="#2f7d63"/>
  <text x="541" y="269" font-size="13" class="inverse">trainable</text>

  <rect x="370" y="355" width="260" height="145" rx="18" fill="#f1f0ed" stroke="#a7aaa5" stroke-width="2"/>
  <text x="402" y="400" class="box-title">Reference model πref</text>
  <text x="402" y="436" class="body">chosen forward → log p_ref+</text>
  <text x="402" y="464" class="body">rejected forward → log p_ref-</text>
  <rect x="535" y="470" width="68" height="26" rx="13" fill="#6e7671"/>
  <text x="549" y="489" font-size="13" class="inverse">frozen</text>

  <rect x="735" y="138" width="250" height="142" rx="18" fill="#edf2f8" stroke="#7d99bb" stroke-width="2"/>
  <text x="765" y="182" class="box-title">Response log-prob</text>
  <text x="765" y="217" class="body">sum over response tokens</text>
  <text x="765" y="246" class="body">policy 与 reference 各两项</text>

  <rect x="735" y="355" width="250" height="125" rx="18" fill="#fff1ed" stroke="#c88876" stroke-width="2"/>
  <text x="765" y="400" class="box-title">Chosen SFT loss</text>
  <text x="765" y="437" class="body">cross entropy；prompt/pad = -100</text>

  <rect x="1015" y="198" width="145" height="112" rx="18" fill="#ece8f5" stroke="#8d7bb3" stroke-width="2"/>
  <text x="1040" y="240" class="box-title">DPO loss</text>
  <text x="1040" y="273" class="body">-log σ(βΔ)</text>

  <rect x="995" y="410" width="175" height="126" rx="18" fill="#24352d"/>
  <text x="1024" y="455" class="box-title inverse">Total loss</text>
  <text x="1024" y="490" font-size="16" class="inverse-soft">L_DPO + λ L_SFT</text>

  <path d="M280 205 C320 205, 330 205, 370 205" class="edge"/>
  <path d="M280 245 C320 330, 330 415, 370 425" class="edge-soft"/>
  <path d="M630 205 C680 205, 690 205, 735 205" class="edge"/>
  <path d="M630 425 C680 350, 690 250, 735 235" class="edge-soft"/>
  <path d="M985 215 C1000 225, 1003 238, 1015 248" class="edge"/>
  <path d="M630 240 C695 285, 680 415, 735 418" class="edge"/>
  <path d="M1088 310 C1088 355, 1088 370, 1088 410" class="edge"/>
  <path d="M985 418 C995 430, 995 450, 995 470" class="edge"/>

  <rect x="60" y="585" width="1110" height="78" rx="16" fill="#ffffff" stroke="#d7ddd9"/>
  <text x="88" y="618" class="box-title">前向次数</text>
  <text x="88" y="648" class="body">策略模型 2 次 + reference model 2 次；SFT 分支复用 chosen logits，不新增模型前向。</text>
</svg>
